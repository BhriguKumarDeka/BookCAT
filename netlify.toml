# Build settings are managed in the Netlify UI to avoid conflicts with the monorepo
# Package directory setting (apps/web).
# Only redirect rules are defined here — they are always read from the repo root.

# SPA catch-all redirect: rewrites all paths to index.html so React Router works.
# Status 200 = rewrite (not HTTP redirect) — the URL stays the same in the browser.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200